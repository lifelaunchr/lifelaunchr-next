<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 24" width="340" height="48" role="img" aria-label="Soar by LifeLaunchr">
  <!-- Graduation cap: diamond board -->
  <polygon points="11,1 22,7 11,13 0,7" fill="#7dd3fc"/>
  <!-- Cap brim -->
  <rect x="1" y="7" width="20" height="3.5" rx="1" fill="#38bdf8"/>
  <!-- Tassel cord -->
  <line x1="22" y1="7" x2="22" y2="19" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="22" cy="21.5" r="2.5" fill="#fb923c"/>
  <!-- "Soar" wordmark -->
  <text x="30" y="18" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="white" letter-spacing="-0.4">Soar</text>
  <!-- "by LifeLaunchr" -->
  <text x="76" y="18" font-family="'Helvetica Neue', Arial, Helvetica, sans-serif" font-size="11" fill="white" fill-opacity="0.55">by LifeLaunchr</text>
</svg>
